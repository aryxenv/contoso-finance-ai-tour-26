name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client:
    name: Client — Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: apps/client

      - name: Lint
        run: npm run lint
        working-directory: apps/client

      - name: Build
        run: npm run build
        working-directory: apps/client

      - name: Test
        run: npm run test
        working-directory: apps/client

  server:
    name: Server — Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: contoso_finance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system -r apps/server/requirements-dev.txt

      - name: Lint
        run: uv run ruff check apps/server/src/ apps/server/tests/

      - name: Test
        run: uv run pytest apps/server/tests/ -v
        env:
          CONTOSO_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/contoso_finance
          PYTHONPATH: apps/server/src

  shared-types:
    name: Shared Types — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: packages/shared-types

      - name: Build
        run: npm run build
        working-directory: packages/shared-types
